# mise: tool and environment management for meigma-packages.
#
# The committed mise.lock records per-platform download URLs and checksums. For
# aqua-backed tools it also records the available provenance verification.
# `settings.locked` makes `mise install` fail closed when a tool lacks a
# pre-resolved URL for the current platform.
#
# Moon remains the task runner and CI gate. It uses the system binaries that
# mise puts on PATH instead of managing a second toolchain.
#
# To bump a tool, edit its version here, then run:
#   mise lock --platform linux-x64,linux-arm64,macos-x64,macos-arm64
# Commit mise.toml and mise.lock together.

[tools]
go = "1.26.4"
python = "3.14.3"

# Explicit aqua references select mise's verifying backend.
"aqua:golangci/golangci-lint" = "2.12.2"
"aqua:koalaman/shellcheck" = "0.11.0"
"aqua:rhysd/actionlint" = "1.7.12"
"aqua:astral-sh/uv" = "0.11.0"
"aqua:moonrepo/moon" = "2.3.5"

[env]
# Never auto-download a Go toolchain other than the mise-pinned version.
GOTOOLCHAIN = "local"

[settings]
lockfile = true
locked = true
