name: Publish validation

on:
  repository_dispatch:
    types: [publish-package]
  workflow_dispatch:
    inputs:
      project:
        description: Registered project to publish
        required: true
        default: incus-gh-runner
        type: string
      tag:
        description: Stable v-prefixed release tag to validate
        required: true
        default: v1.0.0
        type: string
      apply_staging:
        description: Publish the verified release to the protected staging prefix
        required: true
        default: false
        type: boolean
      empty_staging:
        description: Empty only _staging/ before rebuilding it from the release
        required: true
        default: false
        type: boolean
      empty_staging_confirmation:
        description: Type "empty _staging only" when empty_staging is selected
        required: false
        type: string
      apply_production:
        description: Publish to the protected production root after staging succeeds
        required: true
        default: false
        type: boolean
      production_confirmation:
        description: Type "publish incus-gh-runner v1.0.0 to production"
        required: false
        type: string

permissions: {}

jobs:
  validate:
    name: Validate publish path without secrets
    runs-on: ubuntu-latest
    permissions:
      attestations: read
      contents: read
    env:
      GOTOOLCHAIN: local
      PROJECT: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.project || inputs.project }}
      TAG: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.tag || inputs.tag }}
      APPLY_STAGING: ${{ github.event_name == 'repository_dispatch' || inputs.apply_staging }}
      EMPTY_STAGING: ${{ github.event_name == 'workflow_dispatch' && inputs.empty_staging }}
      EMPTY_STAGING_CONFIRMATION: ${{ github.event_name == 'workflow_dispatch' && inputs.empty_staging_confirmation || '' }}
      APPLY_PRODUCTION: ${{ github.event_name == 'repository_dispatch' || inputs.apply_production }}
      PRODUCTION_CONFIRMATION: ${{ github.event_name == 'repository_dispatch' && 'publish incus-gh-runner v1.0.0 to production' || inputs.production_confirmation }}
      MEIGMA_PACKAGES_GITHUB_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: 2026.6.14
          cache: true

      - name: Validate request
        run: >-
          go run ./cmd/meigma-packages validate-request
          --registry projects.yml
          --project "$PROJECT"
          --tag "$TAG"

      - name: Validate protected publication selections
        run: |
          if [[ "$EMPTY_STAGING" == true ]]; then
            [[ "$APPLY_STAGING" == true ]]
            [[ "$EMPTY_STAGING_CONFIRMATION" == 'empty _staging only' ]]
          fi
          if [[ "$APPLY_PRODUCTION" == true ]]; then
            [[ "$APPLY_STAGING" == true ]]
            [[ "$PRODUCTION_CONFIRMATION" == 'publish incus-gh-runner v1.0.0 to production' ]]
          fi

      - name: Prove the real release source path
        run: scripts/phase5-source.sh

  staging:
    name: Publish and verify the protected staging prefix
    if: ${{ github.event_name == 'repository_dispatch' || inputs.apply_staging }}
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      attestations: read
      contents: read
    environment:
      name: staging
      url: https://pkgs.meigma.dev/_staging/
    concurrency:
      group: meigma-packages-r2-staging
      cancel-in-progress: false
    env:
      GOTOOLCHAIN: local
      PUBLICATION_TARGET: staging
      PROJECT: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.project || inputs.project }}
      TAG: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.tag || inputs.tag }}
      EMPTY_STAGING: ${{ github.event_name == 'workflow_dispatch' && inputs.empty_staging }}
      EMPTY_STAGING_CONFIRMATION: ${{ github.event_name == 'workflow_dispatch' && inputs.empty_staging_confirmation || '' }}
      GPG_SIGNING_SUBKEY: ${{ secrets.GPG_SIGNING_SUBKEY }}
      GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
      GPG_PRIMARY_FINGERPRINT: ${{ vars.GPG_PRIMARY_FINGERPRINT }}
      GPG_SIGNING_FINGERPRINT: ${{ vars.GPG_SIGNING_FINGERPRINT }}
      MEIGMA_PACKAGES_R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      MEIGMA_PACKAGES_R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      MEIGMA_PACKAGES_R2_SESSION_TOKEN: ${{ secrets.R2_SESSION_TOKEN }}
      R2_BUCKET: ${{ vars.R2_BUCKET }}
      R2_PREFIX: ${{ vars.R2_PREFIX }}
      R2_ENDPOINT: ${{ vars.R2_ENDPOINT }}
      PUBLIC_BASE_URL: ${{ vars.PUBLIC_BASE_URL }}
      MEIGMA_PACKAGES_GITHUB_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout trusted workflow source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: 2026.6.14
          cache: true

      - name: Publish and verify the real release in staging
        run: scripts/phase5-publish.sh

  production:
    name: Publish and verify the protected production root
    if: ${{ github.event_name == 'repository_dispatch' || inputs.apply_production }}
    needs:
      - validate
      - staging
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      attestations: read
      contents: read
    environment:
      name: production
      url: https://pkgs.meigma.dev/
    concurrency:
      group: meigma-packages-r2-production
      cancel-in-progress: false
    env:
      GOTOOLCHAIN: local
      PUBLICATION_TARGET: production
      PROJECT: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.project || inputs.project }}
      TAG: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.tag || inputs.tag }}
      PRODUCTION_CONFIRMATION: ${{ github.event_name == 'repository_dispatch' && 'publish incus-gh-runner v1.0.0 to production' || inputs.production_confirmation }}
      GPG_SIGNING_SUBKEY: ${{ secrets.GPG_SIGNING_SUBKEY }}
      GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
      GPG_PRIMARY_FINGERPRINT: ${{ vars.GPG_PRIMARY_FINGERPRINT }}
      GPG_SIGNING_FINGERPRINT: ${{ vars.GPG_SIGNING_FINGERPRINT }}
      MEIGMA_PACKAGES_R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      MEIGMA_PACKAGES_R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      MEIGMA_PACKAGES_R2_SESSION_TOKEN: ${{ secrets.R2_SESSION_TOKEN }}
      R2_BUCKET: ${{ vars.R2_BUCKET }}
      R2_PREFIX: ''
      R2_ENDPOINT: ${{ vars.R2_ENDPOINT }}
      PUBLIC_BASE_URL: ${{ vars.PUBLIC_BASE_URL }}
      MEIGMA_PACKAGES_GITHUB_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout trusted workflow source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: 2026.6.14
          cache: true

      - name: Publish and verify the real release in production
        run: scripts/phase5-publish.sh
